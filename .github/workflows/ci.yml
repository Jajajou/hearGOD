name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install portaudio googletest pkg-config cmake

      - name: Build libmysofa from source
        run: |
          git clone --depth 1 https://github.com/hoene/libmysofa.git /tmp/libmysofa
          cmake -B /tmp/libmysofa/build -S /tmp/libmysofa \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/libmysofa/build --parallel
          sudo cmake --install /tmp/libmysofa/build

      - name: Configure
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel --target hearGOD_tests

      - name: Test
        run: |
          cd build
          ctest --output-on-failure --output-junit ../test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
